# ============================================================
# Experiment — Separated VA High/Low classification (no augmentation)
#
# Two independent 2-class models:
#   - arousal: Low (0) = 1–3, High (1) = 4–5
#   - valence: Low (0) = 1–3, High (1) = 4–5
#
# After both LOSO runs: combination overload/alarm from (â_hl, v̂_hl).
# ============================================================
defaults:
  - base

task:
  mode: "va_separated_classify"
  separated:
    selection_metric_arousal: "f1_arousal_high"
    selection_metric_valence: "f1_valence_high"

training:
  weighted_loss: true
  selection_metric: "f1_arousal_high"

augmentation:
  enabled: false
