# ============================================================
# Experiment — Separated VA Regression (no augmentation)
#
# Trains two independent models (own fusion + head each):
#   - arousal-only  → early stop on ccc_arousal
#   - valence-only  → early stop on ccc_valence
#
# Merged loso_results.pt reports per-dimension VA metrics plus
# derived binary alarm from (â, v̂).
# ============================================================
defaults:
  - base

task:
  mode: "regression_va_separated"
  separated:
    selection_metric_arousal: "ccc_arousal"
    selection_metric_valence: "ccc_valence"

training:
  weighted_loss: true
  selection_metric: "ccc_mean"

augmentation:
  enabled: false
