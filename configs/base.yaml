# ============================================================
# Base configuration — shared across all experiments
# ============================================================

paths:
  data_raw: "Data"
  data_processed: "data_processed"
  figures: "figures"
  checkpoints: "checkpoints"

# ============================================================
# Task mode
# ============================================================
task:
  # "classification"            — 2-class CE (Safe=0, Alarm=1)  [default]
  # "regression_va"             — joint A+V heads on shared fusion
  # "va_separated_classify"     — two High/Low classifiers (A / V), merged alarm
  mode: "classification"

  # Store raw arousal + valence in each window tensor during step 04.
  # Required for regression_va. Safe to enable for classification too.
  store_raw_av_in_tensors: true

  # After each regression_va fold: derive binary alarm metrics from VA preds.
  derived_binary_eval: true

# ============================================================
# Data
# ============================================================
data:
  window_size_sec: 5          # annotation granularity is 5 seconds
  audio_sample_rate: 16000    # Hz — Wav2Vec2 expects 16kHz
  # Speaker diarization (stereo debates): mute the other speaker before VAD
  diarization_dilate_ms: 80.0   # expand speech masks slightly at word edges
  diarization_min_gap_sec: 3.0  # fill short dropouts within one speaker's turn
  # Global VAD overlap filter:
  #   1) run VAD once on the diarized mono track
  #   2) keep a 5-second window when enough of it overlaps with speech regions
  vad_min_overlap_sec: 3.0    # keep when at least 3 seconds inside the window are speech
  vad_min_overlap_pct: 0.60    # or when speech covers at least 60% of the window
  e4_signals: ["EDA", "HR", "IBI"]
  eeg_signals: ["theta", "alpha", "beta"]

# ============================================================
# Labels
# ============================================================
labels:
  # Ground truth (step 01) and derived alarm (regression_va) — arousal + valence only.
  # Overloaded (→ Alarm): low valence AND high arousal
  overloaded_max_valence: 3
  overloaded_min_arousal: 4
  # Optimal (→ Safe via merge): high valence AND low arousal
  optimal_min_valence: 4
  optimal_max_arousal: 2
  # High/Low targets for va_separated_classify (1=High 4–5, 0=Low 1–3)
  va_high_low:
    low_values: [1, 2, 3]
    high_values: [4, 5]

# ============================================================
# Model
# ============================================================
model:
  audio_encoder: "wav2vec2"   # options: "wav2vec2", "resnet18"
  # Keep the pretrained Wav2Vec2 weights fixed. Only BiGRU, fusion, and head(s) train.
  # Applies only when audio_encoder is "wav2vec2".
  freeze_audio_backbone: true
  biosignal_hidden_size: 128
  biosignal_num_layers: 2
  # false -> one BiGRU on all 6 channels (default)
  # true  -> separate BiGRU for E4 and EEG, then concat (64+64 -> 256-d when hidden_size=128)
  dual_tower_biosignal: false
  # Optional 1D CNN before BiGRU on physio sequence (~50 steps inside each 5 s window).
  physio_cnn:
    enabled: false
    out_channels: 32
    kernel_size: 5
    num_layers: 1
    dropout: 0.1
  fusion_num_heads: 4
  fusion_dropout: 0.1
  # Used by classification only (always 2: Safe / Alarm).
  num_classes: 2
  # Fusion layer selection.
  #   cross_attn_pooled   -> baseline cross-attention with a pooled biosignal token (default)
  #   sequence_cross_attn -> audio query attends over the BiGRU output sequence (extra option)
  fusion_mode: "cross_attn_pooled"

  # Optional inter-window temporal over fused z (after fusion, before head).
  # enabled=false → single-window behavior (unchanged).
  temporal:
    enabled: false
    type: "none"              # "none" | "gru" | "lstm"
    num_windows: 5            # causal context length (25 s at 5 s granularity)
    hidden_size: 128
    num_layers: 1
    bidirectional: false      # keep false for causal debate-time modeling

  # ── regression_va settings ─────────────────────────────────────────────────
  # Loss applied independently per head; combined as w_a * L_a + w_v * L_v.
  va_loss: "smooth_l1"          # "smooth_l1" | "mse"
  va_loss_weights: [1.0, 1.0]   # used when training.weighted_loss is false
  # Used when task.mode=regression_va AND training.weighted_loss=true
  va_loss_weights_weighted: [1.5, 1.0]
  va_sample_weights:
    enabled: true
    high_arousal_min: 4        # true arousal >= this → multiply loss
    low_valence_max: 3         # true valence <= this → multiply loss
    factor_high_arousal: 2.0
    factor_low_valence: 2.0

# ============================================================
# Training
# ============================================================
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  seed: 42
  # Balanced sampling: K = median(n_i) per participant per epoch (see dataset.py)
  balanced_sampling: true
  # classification: inverse-frequency CE weights (Safe vs Alarm)
  # regression_va:  va_loss_weights_weighted + sample weights on A>=4, V<=3
  weighted_loss: true
  # Stop a fold when validation metric does not improve (0 = train all epochs).
  early_stopping_patience: 8
  early_stopping_min_epochs: 5
  # Metric used for checkpoint selection and early stopping.
  #   classification:  "recall_alarm"
  #   regression_va:   "ccc_mean"
  selection_metric: "recall_alarm"
  # One-time Wav2Vec2 forward pass per window, then train on 768-d vectors only.
  cache_audio_embeddings: true
  # Free RAM after cache (safe with frozen wav2vec2 only).
  drop_waveform_after_embedding_cache: true
  # Mixed precision on CUDA (faster; no effect on CPU).
  use_amp: true

# ============================================================
# Threshold tuning (step 07 — no retraining)
# ============================================================
threshold_tuning:
  # How to pick T on pooled LOSO test predictions:
  #   max_f1 | max_recall | target_recall | youden
  selection: "max_f1"
  target_recall: 0.5       # used when selection = target_recall
  min_precision: 0.0       # filter for max_recall / target_recall
  num_steps: 37              # thresholds from 0.05 to 0.95
  recover_probs: false       # rebuild pred_probs from checkpoints if missing

# ============================================================
# Augmentation — overridden per experiment
# ============================================================
augmentation:
  enabled: false              # true = use pre-augmented tensors from windows_aug/ (see 04_build_tensors.py)
  sensor_noise_std: 0.02      # applied only if e4 completeness == 1.0
  audio_gaussian_std: 0.005
  spec_augment_time_mask: 30  # max time steps to mask
  spec_augment_freq_mask: 10  # max frequency bins to mask
