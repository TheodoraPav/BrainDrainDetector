# ============================================================
# Experiment 3 — VA Regression Baseline (no augmentation)
#
# Trains two heads (arousal + valence) on the native K-EmoCon
# annotation values (1-5 Likert scale).
#
# After each fold the derived 3-class (va_only rules) and binary
# alarm metrics are computed and reported alongside the native
# CCC / MAE metrics.
# ============================================================
defaults:
  - base

task:
  mode: "regression_va"

training:
  selection_metric: "ccc_mean"    # early stopping on (CCC_arousal + CCC_valence) / 2

augmentation:
  enabled: false
